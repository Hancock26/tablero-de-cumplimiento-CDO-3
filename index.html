<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A1628">
<title>CDO Analytics · Expreso Brasilia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sw:220px;--swc:64px;--hh:56px;
  --ink:#0A1628;--ink2:#1E2D45;--ink3:#3D5068;--muted:#7A8FA6;
  --border:rgba(10,22,40,.08);--border2:rgba(10,22,40,.14);
  --bg:#F0F3F8;--s:#FFF;--s2:#F6F8FC;--s3:#ECF0F6;
  --blue:#1B56D4;--blue2:#2E6AF5;--blt:#EBF1FE;
  --green:#0B7F59;--glt:#E6F5EF;
  --amber:#B45309;--alt:#FEF3C7;
  --red:#C0392B;--rlt:#FDECEA;
  --purple:#6B3FC8;--plt:#F1ECFE;
  --teal:#0E7490;--tlt:#E0F4F8;
  --r:12px;--rsm:8px;--rlg:16px;
  --sh:0 1px 3px rgba(10,22,40,.07),0 1px 2px rgba(10,22,40,.04);
  --shm:0 4px 12px rgba(10,22,40,.09),0 1px 3px rgba(10,22,40,.05);
  --shl:0 8px 24px rgba(10,22,40,.12),0 2px 6px rgba(10,22,40,.06);
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sw);background:var(--ink);display:flex;flex-direction:column;z-index:200;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sb.col{width:var(--swc)}
.sb-hd{padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-logo{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--blue2),#4EBBCF);border-radius:9px;display:flex;align-items:center;justify-content:center}
.sb-logo svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
.sb-brand{overflow:hidden;white-space:nowrap}
.sb-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sb-sub{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:10px 8px 4px;white-space:nowrap;overflow:hidden}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.52);font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;text-align:left;white-space:nowrap;width:100%}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.ni.act{background:rgba(43,106,245,.28);color:#fff;font-weight:600}
.ni.act .ico-w{background:var(--blue2)}
.ico-w{width:28px;height:28px;flex-shrink:0;border-radius:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);font-size:14px;transition:background .15s}
.ni-lbl{overflow:hidden}
.sb-ft{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sb-toggle{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.38);font-family:inherit;font-size:12px;width:100%;white-space:nowrap;transition:all .15s}
.sb-toggle:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.05)}

/* ── MAIN ── */
.main{margin-left:var(--sw);transition:margin-left .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;min-height:100vh}
.main.exp{margin-left:var(--swc)}
.topbar{height:var(--hh);background:var(--s);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.bc-cur{color:var(--ink);font-weight:600}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--blt);color:var(--blue)}
.lu{font-size:11px;color:var(--muted)}
.pw{flex:1;padding:24px}

/* ── FILTER BAR ── */
.fb{background:var(--s);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.fg{display:flex;flex-direction:column;gap:4px;min-width:110px;flex:1}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.fg select{font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--rsm);background:var(--s2);color:var(--ink);font-family:inherit;cursor:pointer;transition:border-color .15s}
.fg select:focus{outline:none;border-color:var(--blue2)}
.fg select[multiple]{min-height:78px}
.btn-r{font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--s3);color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;align-self:flex-end}
.btn-r:hover{background:var(--s);border-color:var(--blue2);color:var(--blue)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;gap:14px;margin-bottom:20px}
.kpi-card{background:var(--s);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.kpi-card:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--blue))}
.kpi-ico{width:34px;height:34px;border-radius:9px;background:var(--kb,var(--blt));display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:12px}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.kpi-val{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;font-family:'DM Mono',monospace}
.kpi-foot{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px}
.kpi-delta{font-weight:700}.kpi-delta.up{color:var(--green)}.kpi-delta.dn{color:var(--red)}.kpi-delta.nt{color:var(--muted)}
.kpi-sub{color:var(--muted)}

/* ── CARDS / CHARTS ── */
.row2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.row2eq{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh);margin-bottom:16px}
.card:last-child{margin-bottom:0}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.ch{position:relative}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 14px;border-bottom:1px solid var(--border2);background:var(--s2);white-space:nowrap}
th:first-child{border-radius:8px 0 0 0}th:last-child{border-radius:0 8px 0 0}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.rk{width:24px;height:24px;border-radius:6px;background:var(--s3);color:var(--muted);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.op-n{font-weight:600;font-size:13px}
.mono{font-family:'DM Mono',monospace;font-weight:500;font-size:13px}
.bc-cell{display:flex;align-items:center;gap:8px}
.mb-bg{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:70px}
.mb-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.pct-t{font-size:11px;color:var(--muted);font-weight:600;min-width:34px;text-align:right;font-family:'DM Mono',monospace}

/* dot */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.g{background:var(--green);box-shadow:0 0 0 3px var(--glt)}
.dot.a{background:var(--amber);box-shadow:0 0 0 3px var(--alt)}
.dot.r{background:var(--red);box-shadow:0 0 0 3px var(--rlt)}

/* pill */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.g{background:var(--glt);color:var(--green)}
.pill.a{background:var(--alt);color:var(--amber)}
.pill.r{background:var(--rlt);color:var(--red)}
.pill.b{background:var(--blt);color:var(--blue)}
.pill.p{background:var(--plt);color:var(--purple)}

.pb{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:4px}

/* month-stack */
.ms{display:flex;flex-direction:column;gap:4px;min-width:200px}
.mr{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:var(--s2);border:1px solid var(--border)}
.mn{font-size:10px;font-weight:600;color:var(--ink3);min-width:72px}
.mbw{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px}
.mv{font-size:10px;font-weight:700;min-width:40px;text-align:right;font-family:'DM Mono',monospace}

/* ── HEATMAP ── */
.hmw{overflow-x:auto}
.hm{border-collapse:collapse;font-size:11px;width:100%}
.hm th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:6px 10px;background:var(--s2);border-bottom:1px solid var(--border2);white-space:nowrap}
.hm td{padding:7px 10px;border:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;border-radius:3px}
.hm td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--ink2);white-space:nowrap;background:var(--s2)!important}

/* ── OVERVIEW HERO ── */
.hero{background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 100%);border-radius:var(--rlg);padding:28px 32px;margin-bottom:20px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:20px;box-shadow:var(--shl)}
.hero h2{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.4px}
.hero p{font-size:13px;color:rgba(255,255,255,.45)}
.hero-stats{display:flex;gap:32px;flex-shrink:0}
.hs{text-align:center}
.hs-v{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:#fff}
.hs-l{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ── STATE ── */
.state{text-align:center;padding:80px 20px;color:var(--muted)}
.state-ico{font-size:40px;margin-bottom:14px}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.kpi-5{grid-template-columns:repeat(3,1fr)!important}}
@media(max-width:900px){.row2,.row2eq,.row3{grid-template-columns:1fr}.hero-stats{display:none}}
@media(max-width:768px){
  .sb{transform:translateX(-100%);width:var(--sw)!important}
  .sb.mob{transform:translateX(0)}
  .main{margin-left:0!important}
  .kpi-grid{grid-template-columns:1fr 1fr!important}
  .pw{padding:14px}
  .topbar{padding:0 14px}
  .mbtn{display:flex!important}
}
.mbtn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--s2);cursor:pointer;font-size:18px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.overlay.on{display:block}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMob()"></div>

<!-- SIDEBAR -->
<nav class="sb" id="sb">
  <div class="sb-hd">
    <div class="sb-logo"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div class="sb-brand">
      <div class="sb-name">CDO Analytics</div>
      <div class="sb-sub">Expreso Brasilia</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="nav-sec">Principal</div>
    <button class="ni act" onclick="go('overview',this)"><div class="ico-w">🏠</div><span class="ni-lbl">Resumen General</span></button>
    <div class="nav-sec">Indicadores</div>
    <button class="ni" onclick="go('llamadas',this)"><div class="ico-w">📞</div><span class="ni-lbl">Llamadas</span></button>
    <button class="ni" onclick="go('correos',this)"><div class="ico-w">✉️</div><span class="ni-lbl">Correos</span></button>
    <button class="ni" onclick="go('alertas',this)"><div class="ico-w">🔔</div><span class="ni-lbl">Alertas</span></button>
    <button class="ni" onclick="go('transbordos',this)"><div class="ico-w">🔄</div><span class="ni-lbl">Trasbordos</span></button>
    <div class="nav-sec">Operativo</div>
    <button class="ni" onclick="go('audios',this)"><div class="ico-w">🔊</div><span class="ni-lbl">Audios</span></button>
    <button class="ni" onclick="go('operadores',this)"><div class="ico-w">👥</div><span class="ni-lbl">Operadores</span></button>
  </div>
  <div class="sb-ft">
    <button class="sb-toggle" id="sb-tog" onclick="togSb()">
      <span style="font-size:16px;flex-shrink:0" id="tog-ico">◀</span>
      <span class="ni-lbl" id="tog-lbl" style="font-size:11px">Contraer</span>
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="mbtn" onclick="openMob()">☰</button>
      <div class="bc">
        <span>CDO</span><span style="opacity:.4">›</span>
        <span class="bc-cur" id="bc-cur">Resumen General</span>
      </div>
    </div>
    <div class="tb-right">
      <span class="lu" id="lu">—</span>
      <span class="tb-badge" id="badge">Cargando…</span>
    </div>
  </div>
  <div class="pw" id="pw">
    <div class="state"><div class="state-ico">⏳</div><p>Cargando datos…</p></div>
  </div>
</div>

<script>
/* ═══ CONSTANTS ═══ */
const MO = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const META = {
  overview:   {lbl:'Resumen General',ico:'🏠'},
  llamadas:   {lbl:'Llamadas',  ico:'📞',col:'LLAMADAS',   c:'#1B56D4',lt:'#EBF1FE'},
  correos:    {lbl:'Correos',   ico:'✉️',col:'CORREOS',    c:'#0B7F59',lt:'#E6F5EF'},
  alertas:    {lbl:'Alertas',   ico:'🔔',col:'ALERTAS',    c:'#B45309',lt:'#FEF3C7'},
  transbordos:{lbl:'Trasbordos',ico:'🔄',col:'TRANSBORDOS',c:'#6B3FC8',lt:'#F1ECFE'},
  audios:     {lbl:'Audios',    ico:'🔊'},
  operadores: {lbl:'Operadores',ico:'👥'},
};

let RAW=[], AUD=[], mod='overview', sbCol=false, CH={};
let F={op:[],plat:[],mes:[],anio:[],tipo:[]};

/* ═══ SIDEBAR ═══ */
function togSb(){
  sbCol=!sbCol;
  document.getElementById('sb').classList.toggle('col',sbCol);
  document.getElementById('main').classList.toggle('exp',sbCol);
  document.getElementById('tog-ico').textContent=sbCol?'▶':'◀';
  document.getElementById('tog-lbl').textContent=sbCol?'Expandir':'Contraer';
}
function openMob(){document.getElementById('sb').classList.add('mob');document.getElementById('overlay').classList.add('on')}
function closeMob(){document.getElementById('sb').classList.remove('mob');document.getElementById('overlay').classList.remove('on')}

/* ═══ NAVIGATION ═══ */
function go(m,btn){
  mod=m;
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('act'));
  if(btn) btn.classList.add('act');
  document.getElementById('bc-cur').textContent=META[m]?.lbl||m;
  closeMob();
  render();
}

/* ═══ DATA LOAD ═══ */
async function init(){
  try{
    const t=Date.now();
    const [r1,r2]=await Promise.all([fetch('datos.csv?t='+t),fetch('audios.csv?t='+t)]);
    const [s1,s2]=await Promise.all([r1.text(),r2.text()]);
    RAW=Papa.parse(s1,{header:true,skipEmptyLines:true,dynamicTyping:true}).data.filter(d=>d.OPERADOR&&d.MES);
    AUD=Papa.parse(s2,{header:true,skipEmptyLines:true,dynamicTyping:true}).data.filter(d=>d.OPERADOR&&d.MES);
    const d=new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});
    document.getElementById('lu').textContent='Actualizado '+d;
    document.getElementById('badge').textContent=RAW.length+' registros';
    render();
  }catch(e){
    document.getElementById('pw').innerHTML=`<div class="state"><div class="state-ico">⚠️</div><p style="color:#C0392B;font-weight:600">Error cargando datos</p><p style="font-size:12px;margin-top:8px">${e.message}</p></div>`;
  }
}

/* ═══ HELPERS ═══ */
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const sum=a=>a.reduce((x,y)=>x+y,0);
const srtM=a=>[...a].sort((a,b)=>MO.indexOf(a)-MO.indexOf(b));
const uniq=a=>[...new Set(a)];
function getData(col){
  return RAW.filter(d=>
    (!F.plat.length||F.plat.includes(d.PLATAFORMA))&&
    (!F.mes.length ||F.mes.includes(d.MES))&&
    (!F.anio.length||F.anio.includes(String(d.AÑO)))&&
    (!F.op.length  ||F.op.includes(d.OPERADOR))&&
    (!col||(d[col]!==null&&d[col]!==''&&!isNaN(+d[col])))
  );
}
function getAud(){
  return AUD.filter(d=>
    (!F.mes.length ||F.mes.includes(d.MES))&&
    (!F.anio.length||F.anio.includes(String(d.AÑO)))&&
    (!F.op.length  ||F.op.includes(normOp(d.OPERADOR)))&&
    (!F.tipo.length||F.tipo.includes(d.TIPO))
  );
}
function normOp(s){if(!s)return'';return s.trim().split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ')}
function fmt(v){return(+v).toFixed(2)+'%'}
function sem(v,isT){
  if(isT){return v>=50?'g':v>=20?'a':'r'}
  return v>=1.2?'g':v>=0.6?'a':'r'
}
function semLbl(s){return s==='g'?'Bueno':s==='a'?'Medio':'Bajo'}
function platC(p){return p==='MICHELIN'?{bg:'#EBF1FE',fg:'#1B56D4'}:{bg:'#F1ECFE',fg:'#6B3FC8'}}
function killCharts(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={}}

/* ═══ FILTER BAR ═══ */
function gv(id){const e=document.getElementById(id);return e?[...e.selectedOptions].map(o=>o.value):[]}
function applyF(px){F.op=gv(px+'-op');F.plat=gv(px+'-plat');F.mes=gv(px+'-mes');F.anio=gv(px+'-anio');render()}
function resetF(){F={op:[],plat:[],mes:[],anio:[],tipo:[]};render()}
function fbHTML(px,showOp=true){
  const ops=uniq(RAW.map(d=>d.OPERADOR)).sort();
  const plats=uniq(RAW.map(d=>d.PLATAFORMA)).sort();
  const meses=srtM(uniq(RAW.map(d=>d.MES)));
  const anios=uniq(RAW.map(d=>d.AÑO)).sort().map(String);
  const ml=m=>m.charAt(0)+m.slice(1).toLowerCase();
  const opts=(arr,sel,lf)=>arr.map(v=>`<option value="${v}"${sel.includes(v)?'selected':''}>${lf?lf(v):v}</option>`).join('');
  return`<div class="fb">
    ${showOp?`<div class="fg"><label>Operador</label><select multiple id="${px}-op" onchange="applyF('${px}')">${opts(ops,F.op)}</select></div>`:''}

/* ═══ HEATMAP ═══ */
function buildHM(cid,data,col,color){
  const ops=uniq(data.map(d=>d.OPERADOR)).sort();
  const meses=srtM(uniq(data.map(d=>d.MES)));
  const vals=[];
  const grid={};
  ops.forEach(op=>{grid[op]={};meses.forEach(m=>{
    const v=data.filter(d=>d.OPERADOR===op&&d.MES===m&&d[col]!==null&&d[col]!=='').map(d=>+d[col]);
    grid[op][m]=v.length?avg(v):null;
    if(v.length)vals.push(avg(v));
  })});
  const mx=vals.length?Math.max(...vals):1,mn=vals.length?Math.min(...vals):0;
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  function hc(v){if(v===null)return'#F0F3F8';const t=(v-mn)/(mx-mn||1);return`rgba(${r},${g},${b},${0.1+t*.8})`}
  function tc(v){if(v===null)return'var(--muted)';return(v-mn)/(mx-mn||1)>.6?color:'var(--ink2)'}
  const th=meses.map(m=>`<th>${m.slice(0,3)}</th>`).join('');
  const rows=ops.map(op=>{
    const cells=meses.map(m=>{const v=grid[op][m];return`<td style="background:${hc(v)};color:${tc(v)}">${v!==null?v.toFixed(1)+'%':'—'}</td>`}).join('');
    return`<tr><td>${op.split(' ').slice(0,2).join(' ')}</td>${cells}</tr>`;
  }).join('');
  document.getElementById(cid).innerHTML=`<div class="hmw"><table class="hm"><thead><tr><th>Operador</th>${th}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

  const meses=srtM(uniq(data.map(d=>d.MES)));
  const ops=uniq(AUD.map(d=>d.OPERADOR)).sort();
  const anios=uniq(AUD.map(d=>d.AÑO)).sort().map(String);
  const mesesAll=srtM(uniq(AUD.map(d=>d.MES)));
  const ml=m=>m.charAt(0)+m.slice(1).toLowerCase();
  const opts=(arr,sel,lf)=>arr.map(v=>`<option value="${v}"${sel.includes(v)?'selected':''}>${lf?lf(v):v}</option>`).join('');

  const tot=data.length,mas=data.filter(d=>d.TIPO==='MASIVO').length,dir=data.filter(d=>d.TIPO==='DIRIGIDO').length;
  const estMap={};data.forEach(d=>{estMap[d.ESTANDAR]=(estMap[d.ESTANDAR]||0)+1});
  const estL=Object.entries(estMap).sort((a,b)=>b[1]-a[1]);
  const opMap={};data.forEach(d=>{opMap[d.OPERADOR]=(opMap[d.OPERADOR]||0)+1});
  const opL=Object.entries(opMap).sort((a,b)=>b[1]-a[1]);
  const activeOps=uniq(data.map(d=>d.OPERADOR));

  document.getElementById('pw').innerHTML=`
    <div class="fb">
      <div class="fg"><label>Operador</label><select multiple id="aud-op" onchange="applyFAud()">${opts(ops,F.op)}</select></div>
      <div class="fg"><label>Tipo de Audio</label>
        <select multiple id="aud-tipo" onchange="applyFAud()">
          <option value="MASIVO"${F.tipo.includes('MASIVO')?'selected':''}>📣 Masivo</option>
          <option value="DIRIGIDO"${F.tipo.includes('DIRIGIDO')?'selected':''}>🎯 Dirigido</option>
        </select>
      </div>
      <div class="fg"><label>Mes</label><select multiple id="aud-mes" onchange="applyFAud()">${opts(mesesAll,F.mes,ml)}</select></div>
      <div class="fg"><label>Año</label><select multiple id="aud-anio" onchange="applyFAud()">${opts(anios,F.anio)}</select></div>
      <button class="btn-r" onclick="resetF()">✕ Limpiar</button>
    </div>
    ${F.tipo.length===1?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px 16px;background:${F.tipo[0]==='MASIVO'?'#EBF1FE':'#F1ECFE'};border-radius:8px;font-size:12px;font-weight:600;color:${F.tipo[0]==='MASIVO'?'#1B56D4':'#6B3FC8'}">
      ${F.tipo[0]==='MASIVO'?'📣':'🎯'} Filtrando solo audios <strong>${F.tipo[0]==='MASIVO'?'MASIVOS':'DIRIGIDOS'}</strong> — ${tot.toLocaleString('es-CO')} registros
    </div>`:''}
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card" style="--kc:${c};--kb:${lt}"><div class="kpi-ico">🔊</div><div class="kpi-lbl">Total Audios</div><div class="kpi-val" style="color:${c}">${tot.toLocaleString('es-CO')}</div><div class="kpi-foot"><span class="kpi-sub">${meses.length} meses</span></div></div>
      <div class="kpi-card" style="--kc:#1B56D4;--kb:#EBF1FE"><div class="kpi-ico">📣</div><div class="kpi-lbl">Masivos</div><div class="kpi-val" style="color:#1B56D4">${mas.toLocaleString('es-CO')}</div><div class="kpi-foot"><span class="kpi-sub">${tot>0?(mas/tot*100).toFixed(1):0}% del total</span></div></div>
      <div class="kpi-card" style="--kc:#6B3FC8;--kb:#F1ECFE"><div class="kpi-ico">🎯</div><div class="kpi-lbl">Dirigidos</div><div class="kpi-val" style="color:#6B3FC8">${dir.toLocaleString('es-CO')}</div><div class="kpi-foot"><span class="kpi-sub">${tot>0?(dir/tot*100).toFixed(1):0}% del total</span></div></div>
      <div class="kpi-card" style="--kc:#0B7F59;--kb:#E6F5EF"><div class="kpi-ico">👤</div><div class="kpi-lbl">Operadores activos</div><div class="kpi-val" style="color:#0B7F59">${activeOps.length}</div><div class="kpi-foot"><span class="kpi-sub">Prom. ${activeOps.length>0?(tot/activeOps.length).toFixed(0):0}/op</span></div></div>
    </div>
    <div class="row2eq">
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Envíos por mes (apilado)</span></div><div class="ch" style="height:220px"><canvas id="aud-m"></canvas></div></div>
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Masivos vs Dirigidos</span></div><div class="ch" style="height:220px"><canvas id="aud-do"></canvas></div></div>
    </div>
    <div class="row2eq" style="margin-top:16px">
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Estándares más enviados</span></div><div class="ch" style="height:250px"><canvas id="aud-est"></canvas></div></div>
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Ranking por operador</span></div><div class="ch" style="height:250px"><canvas id="aud-op2"></canvas></div></div>
    </div>
  `;

  CH['aud-m']=new Chart(document.getElementById('aud-m'),{type:'bar',data:{labels:meses.map(m=>m.slice(0,3)),datasets:[{label:'Masivo',data:meses.map(m=>data.filter(d=>d.MES===m&&d.TIPO==='MASIVO').length),backgroundColor:'#1B56D4cc',borderRadius:4,borderWidth:0},{label:'Dirigido',data:meses.map(m=>data.filter(d=>d.MES===m&&d.TIPO==='DIRIGIDO').length),backgroundColor:'#6B3FC8cc',borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:{size:10}},stacked:true},y:{ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'},beginAtZero:true,stacked:true}}}});
  CH['aud-do']=new Chart(document.getElementById('aud-do'),{type:'doughnut',data:{labels:['Masivo','Dirigido'],datasets:[{data:[mas,dir],backgroundColor:['#1B56D4','#6B3FC8'],borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}}}}});
  CH['aud-est']=new Chart(document.getElementById('aud-est'),{type:'bar',indexAxis:'y',data:{labels:estL.slice(0,8).map(e=>e[0].slice(0,32)),datasets:[{data:estL.slice(0,8).map(e=>e[1]),backgroundColor:c+'cc',borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'},beginAtZero:true},y:{ticks:{font:{size:9}},grid:{display:false}}}}});
  CH['aud-op2']=new Chart(document.getElementById('aud-op2'),{type:'bar',indexAxis:'y',data:{labels:opL.slice(0,14).map(e=>normOp(e[0]).split(' ')[0]),datasets:[{data:opL.slice(0,14).map(e=>e[1]),backgroundColor:opL.slice(0,14).map((_,i)=>c+(i===0?'ff':'88')),borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'},beginAtZero:true},y:{ticks:{font:{size:9}},grid:{display:false}}}}});
}

/* ═══ OPERADORES ═══ */
function rOperadores(){
  const data=getData();
  const ops=uniq(data.map(d=>d.OPERADOR)).sort();
  const COLS=['LLAMADAS','CORREOS','ALERTAS'];
  const CLR=['#1B56D4','#0B7F59','#B45309'];
  const rows=ops.map(op=>{
    const od=data.filter(d=>d.OPERADOR===op);
    const v=COLS.map(c=>avg(od.filter(d=>d[c]!==null).map(d=>+d[c])));
    const sc=avg(v.filter(x=>x>0));
    const plts=uniq(od.map(d=>d.PLATAFORMA));
    const meses=srtM(uniq(od.map(d=>d.MES)));
    const trn=od.filter(d=>d.TRANSBORDOS!==null).reduce((a,d)=>a+(+d.TRANSBORDOS),0);
    return{op,v,sc,plts,meses,trn};
  }).sort((a,b)=>b.sc-a.sc);
  const avgSc=avg(rows.map(r=>r.sc));

  document.getElementById('pw').innerHTML=`
    ${fbHTML('ops',true)}
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi-card" style="--kc:#1B56D4;--kb:#EBF1FE"><div class="kpi-ico">👥</div><div class="kpi-lbl">Operadores activos</div><div class="kpi-val" style="color:#1B56D4">${ops.length}</div><div class="kpi-foot"><span class="kpi-sub">En selección actual</span></div></div>
      <div class="kpi-card" style="--kc:#0B7F59;--kb:#E6F5EF"><div class="kpi-ico">⭐</div><div class="kpi-lbl">Mejor score</div><div class="kpi-val" style="color:#0B7F59">${rows.length?rows[0].sc.toFixed(2)+'%':'—'}</div><div class="kpi-foot"><span class="kpi-sub">${rows.length?rows[0].op.split(' ')[0]:'—'}</span></div></div>
      <div class="kpi-card" style="--kc:#B45309;--kb:#FEF3C7"><div class="kpi-ico">📊</div><div class="kpi-lbl">Score promedio</div><div class="kpi-val" style="color:#B45309">${avgSc.toFixed(2)}%</div><div class="kpi-foot"><span class="kpi-sub">Todas las métricas</span></div></div>
    </div>
    <div class="row2eq">
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Radar top 6 operadores</span></div><div class="ch" style="height:280px"><canvas id="ops-rad"></canvas></div></div>
      <div class="card" style="margin-bottom:0"><div class="card-hd"><span class="card-ttl">Score por operador</span></div><div class="ch" style="height:280px"><canvas id="ops-sc"></canvas></div></div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-hd"><span class="card-ttl">Scorecard de operadores</span></div>
      <div class="tw"><table>
        <thead><tr><th>#</th><th>Operador</th><th>Plataforma</th><th style="color:#1B56D4">Llamadas</th><th style="color:#0B7F59">Correos</th><th style="color:#B45309">Alertas</th><th style="color:#6B3FC8">Trasbordos</th><th>Score</th><th>Meses</th></tr></thead>
        <tbody>${rows.map((r,i)=>{
          const s=sem(r.sc);
          return`<tr>
            <td><span class="rk" style="${i<3?'background:var(--blt);color:var(--blue)':''}">${i+1}</span></td>
            <td class="op-n">${r.op}</td>
            <td>${r.plts.map(p=>{const pc=platC(p);return`<span class="pb" style="background:${pc.bg};color:${pc.fg}">${p}</span>`}).join(' ')}</td>
            ${r.v.map((v,ci)=>`<td class="mono" style="color:${CLR[ci]}">${v>0?v.toFixed(2)+'%':'—'}</td>`).join('')}
            <td class="mono" style="color:#6B3FC8">${r.trn>0?r.trn.toLocaleString('es-CO'):'—'}</td>
            <td><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-weight:700;color:${r.sc>=1.2?'#0B7F59':r.sc>=0.6?'#B45309':'#C0392B'}">${r.sc.toFixed(2)}%</span><span class="dot ${s}"></span></div></td>
            <td style="font-size:10px;color:var(--muted)">${r.meses.map(m=>m.slice(0,3)).join(', ')}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
    </div>
  `;

  const top6=rows.slice(0,6);
  CH['ops-rad']=new Chart(document.getElementById('ops-rad'),{type:'radar',data:{labels:['Llamadas','Correos','Alertas'],datasets:top6.map((r,i)=>({label:r.op.split(' ')[0],data:r.v.map(v=>+v.toFixed(2)),borderColor:['#1B56D4','#0B7F59','#B45309','#6B3FC8','#0E7490','#C0392B'][i],backgroundColor:['#1B56D4','#0B7F59','#B45309','#6B3FC8','#0E7490','#C0392B'][i]+'22',borderWidth:2,pointRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}}},scales:{r:{ticks:{font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.07)'},beginAtZero:true}}}});

  CH['ops-sc']=new Chart(document.getElementById('ops-sc'),{type:'bar',indexAxis:'y',data:{labels:rows.map(r=>r.op.split(' ')[0].slice(0,10)),datasets:[{data:rows.map(r=>+r.sc.toFixed(2)),backgroundColor:rows.map(r=>r.sc>=1.2?'#0B7F59cc':r.sc>=0.6?'#B45309cc':'#C0392Bcc'),borderRadius:4,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.04)'},beginAtZero:true},y:{ticks:{font:{size:9}},grid:{display:false}}}}});
}

/* ═══ START ═══ */
init();
</script>
</body>
</html>
